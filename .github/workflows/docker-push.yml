name: Docker Build & Push Backend

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      # Action lay code tu Github
      - name: Checkout repository
        uses: actions/checkout@v4

      # Action Dang nhap Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Action Dong goi & Day Image
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Ten Image lay theo ten repo chuyen sang chu thuong
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/webbanhang_nhom11_be:latest
